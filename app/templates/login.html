<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Login | HealthNews</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
    <main class="auth-card">
        <div class="auth-logo">💙</div>
        <h1>Entrar no HealthNews</h1>
        <p>Monitore notícias e crie sugestões de posts para LinkedIn.</p>

        {% if error %}
            <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post" class="auth-form">
            <label>Usuário</label>
            <input type="text" name="username" placeholder="Ex: giovanna" required />

            <label>Senha</label>
            <input type="password" name="password" placeholder="Sua senha" required />

            <button type="submit">Entrar</button>
        </form>

        <p class="auth-link">Ainda não tem conta? <a href="/register">Criar conta</a></p>
    </main>
</body>
</html>
